# Netlify build & deploy config
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  functions = "netlify/functions"

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # HSTS — force HTTPS for two years, include all subdomains, preload-eligible.
    # Safe because joetay.com is HTTPS-only on Netlify and has no HTTP subdomains.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Isolate the browsing context from other-origin tabs (tabnabbing defence
    # complementing the per-link rel="noopener" from PR #50).
    # "allow-popups" lets the WhatsApp / Calendly / external links keep opening
    # in new tabs; only cross-origin window.opener is blocked.
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Match the .jpg/.png pattern — hero preloads target webp variants so this
# is the highest-leverage cache rule on the site.
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Friendly alias so the form can POST to /api/submit-lead as well
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA-style fallback not needed — this is a multi-page static site

# Monthly price-alert digest — matches subscriptions against the latest
# HDB dataset month and emails Joe one follow-up list (see alert-digest.js).
[functions."alert-digest"]
  schedule = "4 15 19 7 *"  # TEMP one-shot test fire — revert to "37 1 6 * *"
